name: Bulletproof Mag Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          path: firmware

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.11

      - name: Install West & Requirements
        run: |
          pip install west
          west init -l firmware
          west update --narrow -o=--depth=1
          pip install -r zephyr/scripts/requirements.txt

      - name: Install Zephyr SDK
        run: |
          wget -q https://github.com/zephyrproject-rtos/sdk-ng/releases/download/v0.16.5-1/zephyr-sdk-0.16.5-1_linux-x86_64.tar.xz
          tar xf zephyr-sdk-0.16.5-1_linux-x86_64.tar.xz
          cd zephyr-sdk-0.16.5-1
          ./setup.sh -t arm-zephyr-eabi -c

      - name: Inject Custom Configs
        run: |
          cd firmware
          echo "" >> prj.conf
          echo "# --- CUSTOM INJECTED CONFIGS ---" >> prj.conf
          echo "CONFIG_CLOCK_CONTROL_NRF_K32SRC_RC=y" >> prj.conf
          echo "CONFIG_CLOCK_CONTROL_NRF_K32SRC_XTAL=n" >> prj.conf
          echo "CONFIG_CLOCK_CONTROL_NRF_K32SRC_500PPM=y" >> prj.conf
          echo "CONFIG_MAGNETOMETER=y" >> prj.conf
          echo "CONFIG_SLIMEVR_MAGNETOMETER=y" >> prj.conf
          echo "CONFIG_SLIMEVR_MAG_QMC6309=y" >> prj.conf
          echo "CONFIG_I2C=y" >> prj.conf
          echo "CONFIG_LSM6DSV=y" >> prj.conf

      - name: Build Firmware
        # 핵심 해결책: sysbuild 버그를 피하기 위해 절대경로(-DBOARD_ROOT=$PWD)를 강제로 전달합니다.
        run: |
          cd firmware
          west build -b promicro_uf2/nrf52840/i2c -d build -- -DBOARD_ROOT=$PWD

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: SlimeNRF_QMC6309_I2C_NoCLK_Final
          path: firmware/build/zephyr/zephyr.uf2
